<!doctype html>
<html lang="pt-BR" data-bs-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link href="style.css" rel="stylesheet">

  <title>NotesBlock</title>

</head>

<body>
  <!-- Navbar padrão -->
  <nav class="navbar bg-body-tertiary border-end fixed-top d-flex flex-column align-items-start p-3"
    style="width: 250px; height: 100vh;">
    <div class="container-fluid d-flex flex-column align-items-start p-0"
      style="flex-direction: column; align-items: flex-start;">

      <a class="navbar-brand mb-0 h1 d-flex align-items-center" href="#">
        <img src="C:\Users\LENOVO\Downloads\Design sem nome (1).jpg" width="30" height="30"
          class="d-inline-block align-top me-2" alt="">
        NotesBlock
      </a>

      <ul class="navbar-nav me-auto mb-lg-0">

        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#"> 👤 Perfil</a>
        </li>

         <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">🗑️ Lixeira</a>
        </li>

      </ul>
    </div>

    <div class="d-flex align-items-center mt-auto dropup style-dropup-container">
      <button class="btn btn-outline active theme-toggle mb-0 shadow-sm" type="button" data-bs-toggle="dropdown">
        🎨 Temas
      </button>
      <ul class="dropdown-menu themes-list w-100">
        <li>
          <a class="dropdown-item" href="#" data-theme="light">🌞 Light</a>
        </li>
        <li>
          <a class="dropdown-item" href="#" data-theme="dark">🌙 Dark</a>
        </li>
      </ul>
    </div>

  </nav>

  <div class="main-content me-0" style="margin-left: 250px; padding: 2rem;">
    <h1 class="fw-bold mb-5">Bem-vindo ao NotesBlock Nome do Usuário</h1>

    <!-- Botões de notas-->
    <div class="container">

      <div class="d-flex flex-wrap gap-4">
        
        <div style="width: 200px;">
          <span class="fs-5 fw-medium d-block mb-2 text-truncate">Nova Nota</span>
          <button class="btn btn-outline active w-100 p-4 d-flex align-items-center justify-content-center rounded-3 shadow-sm text-decoration-none" style="height: 180px;" type="button">
            <span class="fs-1 fw-bold">+</span>
          </button>
        </div>

        <div style="width: 200px;">
          <span class="fs-5 fw-medium d-block mb-2 text-truncate">Título da Nota</span>
          <button class="btn btn-outline active w-100 p-4 d-flex align-items-center justify-content-center rounded-3 shadow-sm text-decoration-none" style="height: 180px;" type="button">
            <span class="fs-1 fw-bold"></span>
          </button>
        </div>
        
      </div>

    </div>
  </div>

  <script>
    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const temaSelecionado = e.target.getAttribute('data-theme');
        document.documentElement.setAttribute('data-bs-theme', temaSelecionado);
      });
    });
  </script>
</body>

</html>
